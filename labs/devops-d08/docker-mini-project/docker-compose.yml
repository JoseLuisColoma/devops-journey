services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: devopsdb
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: node:18
    working_dir: /app
    volumes:
      - ./app:/app
    command: bash -c "npm install && node server.js"
    depends_on:
      - db

  nginx:
    image: nginx
    ports:
      - "8085:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  db_data:
